name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Clone WebView Template
      run: |
        git clone https://github.com/flycrane801/Android-WebView-App-Template.git template
        rm -rf template/app/src/main/assets/*
        cp -r * template/app/src/main/assets/ || true
        rm -rf template/app/src/main/assets/template

    - name: Build APK with Gradle
      run: |
        cd template
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: OneStoreTV-APK
        path: template/app/build/outputs/apk/debug/app-debug.apk
